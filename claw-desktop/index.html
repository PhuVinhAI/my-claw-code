<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw Desktop</title>
    
    <!-- Prevent FOUC: Load theme before render -->
    <script>
      // Read theme from localStorage immediately (synchronous)
      const theme = localStorage.getItem('theme');
      
      // Default to dark if no preference set
      if (theme === 'dark' || !theme) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    </script>
    
    <!-- Set initial background color to prevent flash -->
    <style>
      /* Match dark theme background (zinc-950) */
      html, body {
        background-color: #09090b;
        margin: 0;
        padding: 0;
      }
      /* Override for light theme */
      html.light, html.light body {
        background-color: #ffffff;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
